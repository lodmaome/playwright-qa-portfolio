name: Update Visual Snapshots

on:
  workflow_dispatch:

jobs:
  update-snapshots:
    runs-on: ubuntu-latest

    env:
      UI_BASE_URL: ${{ secrets.UI_BASE_URL }}
      STANDARD_USERNAME: ${{ secrets.STANDARD_USERNAME }}
      LOCKED_USERNAME: ${{ secrets.LOCKED_USERNAME }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_USERNAME: ${{ secrets.API_USERNAME }}
      API_PASSWORD: ${{ secrets.API_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Update snapshots
        run: npx playwright test --project=visual --update-snapshots --workers=4

      - uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshots
          path: tests/ui/**/*.png
